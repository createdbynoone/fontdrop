appId: com.fontdrop.app
productName: FontDrop
copyright: "© 2026 FontDrop"
afterPack: scripts/sign-adhoc.js

publish:
  provider: github
  owner: createdbynoone
  repo: fontdrop
  releaseType: release

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json
  - node_modules/opentype.js/**

extraResources:
  - from: build/icons
    to: icons
    filter:
      - '*.png'

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # identity: null → builds without code signing (for local use)
  # Remove this line and set up signing for App Store / notarization
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64

dmg:
  title: FontDrop
  iconSize: 80
  window:
    width: 540
    height: 380
  contents:
    - x: 165
      y: 185
    - x: 375
      y: 185
      type: link
      path: /Applications
