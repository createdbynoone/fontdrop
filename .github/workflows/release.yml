name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare version tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          VERSION=$(node -p "require('./package.json').version")
          git tag -d "v${VERSION}" 2>/dev/null || true
          git push --delete origin "v${VERSION}" 2>/dev/null || true
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Build
        run: |
          npx electron-vite build
          npx electron-builder --config electron-builder.yml --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --latest \
            2>/dev/null || true
          gh release upload "v${VERSION}" \
            dist/fontdrop-${VERSION}-universal.dmg \
            dist/fontdrop-${VERSION}-universal.dmg.blockmap \
            dist/latest-mac.yml \
            --clobber
